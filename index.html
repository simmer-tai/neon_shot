<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Sphere</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="player" class="neon-sphere"></div>
        
        <!-- UIレイヤー -->
        <div id="ui-layer">
            <div id="hp-ui">HP: 3</div>
            <div id="phase-ui">
                <div id="phase-name">BATTLE PHASE</div>
                <div id="phase-timer">60s</div>
            </div>
        </div>

        <!-- 演出用レイヤー -->
        <div id="flash-overlay"></div>

        <!-- ゲームオーバー画面 -->
        <div id="game-over-ui" class="hidden">
            <h1>GAME OVER</h1>
            <div id="final-stats">Survival: 0s | Kills: 0</div>
            <div class="restart-hint">CLICK TO RESTART</div>
        </div>

        <!-- カード選択UI -->
        <div id="card-selection-ui" class="hidden overlay-ui">
            <h2>CHOOSE A CARD</h2>
            <div id="card-candidates">
                <!-- JSで動的に追加 -->
            </div>
        </div>

        <!-- ビルド画面（スキルツリー） -->
        <div id="build-ui" class="hidden overlay-ui">
            <canvas id="build-grid-canvas"></canvas>

            <div id="skill-tree-layout">
                <!-- 左：スキルツリー（スクロール可能） -->
                <div id="skill-tree-panel">
                    <div id="skill-tree-sp">SP: 0</div>
                    <div id="skill-tree-scroll-area">
                        <div id="skill-tree-nodes"></div>
                    </div>
                </div>

                <!-- 右：ステータス -->
                <div id="skill-tree-status">
                    <h3 class="build-section-title">STATUS</h3>
                    <div id="status-panel"></div>
                </div>
            </div>

            <button id="finish-build-btn">FINISH BUILD</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
